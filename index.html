      /* Course Theme Color Profile Palette (Spring Green Accent) */
      --brand-primary: #34a853;
      --brand-primary-glow: rgba(52, 168, 83, 0.15);
      --brand-primary-hover: #2ca04c;
      
      --bg-main: #090a0f;
      --bg-sidebar: #12131a;
      --bg-card: #1c1e29;
      --bg-card-hover: #252836;
      --border-color: #2e3245;
      
      --text-main: #f3f4f6;
      --text-muted: #8e96aa;
      
      /* Level Tracking / Difficulty Badge Color System */
      --crit-color: #ef4444;
      --crit-glow: rgba(239, 68, 68, 0.1);
      --high-color: #f97316;
      --high-glow: rgba(249, 115, 22, 0.1);
      --med-color: #3b82f6;
      --med-glow: rgba(59, 130, 246, 0.1);
      --low-color: #10b981;
      --low-color-glow: rgba(16, 185, 129, 0.1);
      
      --sidebar-width: 320px; 
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    /* Layout Configurations */
    .app-container {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    /* Left Navigation Panel Index */
    aside {
      width: var(--sidebar-width);
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100%;
      z-index: 10;
      flex-shrink: 0; 
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .brand-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 20px;
      height: 20px;
      color: var(--brand-primary);
      flex-shrink: 0;
    }

    .brand-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Search Component Controls Container Matrix */
    .search-wrapper {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      background-color: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-main);
      padding: 8px 12px 8px 32px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .search-input:focus {
      border-color: var(--brand-primary);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* Scrollable Chapter Module Elements Matrix */
    .toc-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
    }

    .toc-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .toc-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .toc-scroll::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 2px;
    }

    .toc-item {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: all 0.15s ease;
      margin-bottom: 4px;
    }

    .toc-item:hover {
      background-color: var(--bg-card);
      border-color: var(--border-color);
    }

    .toc-item.active {
      background-color: var(--brand-primary-glow);
      border-color: var(--brand-primary);
    }

    .toc-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .toc-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--brand-primary);
    }

    .toc-item.active .toc-num {
      color: var(--brand-primary-hover);
    }

    .severity-badge {
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .badge-core { background-color: var(--low-color-glow); color: var(--low-color); }
    .badge-intermediate { background-color: var(--med-glow); color: var(--med-color); }
    .badge-advanced { background-color: var(--high-glow); color: var(--high-color); }
    .badge-expert { background-color: var(--crit-glow); color: var(--crit-color); }

    .toc-title {
      font-size: 12.5px; 
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.35;
    }

    .toc-footer-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10.5px;
      color: var(--text-muted);
    }

    .no-results-msg {
      padding: 24px 12px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      display: none;
    }

    /* Right Main Display Sandbox Frame */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background-color: var(--bg-main);
      position: relative;
      min-width: 0; 
    }

    /* Sub-header Navigation Bar Grid */
    .content-header {
      height: 60px; 
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background-color: rgba(9, 10, 15, 0.7);
      backdrop-filter: blur(12px);
      z-index: 5;
    }

    .header-left-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mobile-menu-toggle {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .incident-nav-meta {
      display: flex;
      flex-direction: column;
    }

    .incident-id-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .incident-subject {
      font-size: 14px; 
      font-weight: 600;
      color: var(--text-main);
      margin-top: 1px;
    }

    .action-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 12px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s ease;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .btn:hover {
      background-color: var(--bg-card-hover);
      border-color: rgba(255,255,255,0.15);
    }

    .btn-primary {
      background-color: var(--brand-primary);
      border-color: var(--brand-primary);
    }

    .btn-primary:hover {
      background-color: var(--brand-primary-hover);
      border-color: var(--brand-primary-hover);
    }

    /* HTML Embed Frame Block Container */
    .workspace-frame-wrapper {
      flex: 1;
      position: relative;
      background-color: #14151f;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #fffdf9;
    }

    .loader-mask {
      position: absolute;
      inset: 0;
      background-color: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 8;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    .loader-mask.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2.5px solid var(--border-color);
      border-top-color: var(--brand-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Responsive Queries Configurations */
    @media (max-width: 1024px) {
      aside {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
      }

      aside.mobile-open {
        transform: translateX(0);
        box-shadow: 24px 0 48px rgba(0,0,0,0.8);
      }

      .mobile-menu-toggle {
        display: block;
      }
    }
  </style>
</head>

    ];

    let currentIncidentIndex = -1;

    // Sidebar Initialization Lifecycle Loop
    function initSidebar() {
      const container = document.getElementById('tocContainer');
      
      incidents.forEach((incident, index) => {
        const itemBtn = document.createElement('button');
        itemBtn.className = 'toc-item';
        itemBtn.setAttribute('data-index', index);
        itemBtn.onclick = () => openIncident(index);

        itemBtn.innerHTML = `
          <div class="toc-meta">
            <span class="toc-num">${incident.id}</span>
            <span class="severity-badge ${incident.bClass}">${incident.badge}</span>
          </div>
          <div class="toc-title">${incident.subject}</div>
          <div class="toc-footer-info">
            <span>Duration: ${incident.duration}</span>
          </div>
        `;
        container.appendChild(itemBtn);
      });
    }

    // Input-driven Live Search Filters Module Matrix
    function filterMenuItems() {
      const filter = document.getElementById('menuSearchInput').value.toLowerCase();
      const items = document.querySelectorAll('.toc-item');
      let visibleCount = 0;

      items.forEach((item) => {
        const titleText = item.querySelector('.toc-title').textContent.toLowerCase();
        const idText = item.querySelector('.toc-num').textContent.toLowerCase();
        
        if (titleText.includes(filter) || idText.includes(filter)) {
          item.style.display = 'flex';
          visibleCount++;
        } else {
          item.style.display = 'none';
        }
      });

      const fallbackMsg = document.getElementById('noResultsMessage');
      fallbackMsg.style.display = (visibleCount === 0) ? 'block' : 'none';
    }

    // Content Display Sandbox Target Synchronization Setup
    function openIncident(index) {
      if (index < 0 || index >= incidents.length) return;
      currentIncidentIndex = index;
      const target = incidents[index];

      document.getElementById('currentIdTag').textContent = `MODULE // ${target.id}`;
      document.getElementById('currentSubject').textContent = target.subject;

      // Reset and trigger loader states synchronously
      const loader = document.getElementById('iframeLoader');
      loader.classList.remove('hidden');

      const sandbox = document.getElementById('displaySandbox');
      sandbox.src = target.file;

      // Handle active button class state arrays
      const items = document.querySelectorAll('.toc-item');
      items.forEach((btn) => {
        if (parseInt(btn.getAttribute('data-index')) === index) {
          btn.classList.add('active');
          btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          btn.classList.remove('active');
        }
      });

      const sidebar = document.getElementById('dashboardSidebar');
      if (sidebar.classList.contains('mobile-open')) {
        toggleMobileSidebar();
      }
    }

    function onFrameLoad() {
      document.getElementById('iframeLoader').classList.add('hidden');
    }

    function navigateIncident(direction) {
      let targetIndex = currentIncidentIndex + direction;
      if (targetIndex >= 0 && targetIndex < incidents.length) {
        openIncident(targetIndex);
      }
    }

    function toggleMobileSidebar() {
      const sidebar = document.getElementById('dashboardSidebar');
      const text = document.getElementById('toggleButtonText');
      sidebar.classList.toggle('mobile-open');
      text.textContent = sidebar.classList.contains('mobile-open') ? "Close Menu" : "View Menu";
    }

    function copyFileLink() {
      if (currentIncidentIndex === -1) return;
      const fullPath = window.location.origin + '/' + incidents[currentIncidentIndex].file;
      navigator.clipboard.writeText(fullPath).then(() => {
        alert(`Resource link copied successfully:\n${fullPath}`);
      });
    }

    // Run structural instantiation loops on load lifecycle window
    window.addEventListener('DOMContentLoaded', () => {
      initSidebar();
      openIncident(0);
    });
  </script>
</body>
