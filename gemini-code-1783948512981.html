    :root {
      /* Course Theme Color Profile Palette (Spring Green Accent) */
      --brand-primary: #34a853;
      --brand-primary-glow: rgba(52, 168, 83, 0.15);
      --brand-primary-hover: #2ca04c;
      
      --bg-main: #090a0f;
      --bg-sidebar: #12131a;
      --bg-card: #1c1e29;
      --bg-card-hover: #252836;
      --border-color: #2e3245;
      
      --text-main: #f3f4f6;
      --text-muted: #8e96aa;
      
      /* Difficulty Tracking Badges */
      --low-color: #10b981;
      --low-color-glow: rgba(16, 185, 129, 0.1);
      
      --sidebar-width: 340px; 
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    .app-container {
      display: flex;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    aside {
      width: var(--sidebar-width);
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100%;
      z-index: 10;
      flex-shrink: 0; 
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .brand-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 20px;
      height: 20px;
      color: var(--brand-primary);
      flex-shrink: 0;
    }

    .brand-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .search-wrapper {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      background-color: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-main);
      padding: 8px 12px 8px 32px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--brand-primary);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .toc-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
    }

    /* Accordion Section Wrapper Elements styling */
    .section-container {
      margin-bottom: 8px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background-color: rgba(28, 30, 41, 0.2);
      overflow: hidden;
    }

    .section-header {
      width: 100%;
      background-color: var(--bg-card);
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border: none;
      text-align: left;
      outline: none;
      transition: background-color 0.2s ease;
    }

    .section-header:hover {
      background-color: var(--bg-card-hover);
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding-right: 8px;
      line-height: 1.4;
    }

    .section-arrow {
      font-size: 10px;
      color: var(--brand-primary);
      transition: transform 0.2s ease;
    }

    .section-content {
      display: block; 
      padding: 6px;
      border-top: 1px solid var(--border-color);
      background-color: rgba(9, 10, 15, 0.4);
    }

    /* Accordion Closed States styling toggles */
    .section-container.collapsed .section-content {
      display: none;
    }

    .section-container.collapsed .section-arrow {
      transform: rotate(-90deg);
    }

    .toc-item {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 5px;
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: all 0.15s ease;
      margin-bottom: 2px;
    }

    .toc-item:hover {
      background-color: var(--bg-card);
      border-color: var(--border-color);
    }

    .toc-item.active {
      background-color: var(--brand-primary-glow);
      border-color: var(--brand-primary);
    }

    .toc-title {
      font-size: 12px; 
      font-weight: 500;
      color: var(--text-main);
      line-height: 1.4;
    }

    .toc-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .severity-badge {
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      background-color: var(--low-color-glow); 
      color: var(--low-color);
    }

    .no-results-msg {
      padding: 24px 12px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      display: none;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background-color: var(--bg-main);
      position: relative;
      min-width: 0; 
    }

    .content-header {
      height: 60px; 
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background-color: rgba(9, 10, 15, 0.7);
      backdrop-filter: blur(12px);
      z-index: 5;
    }

    .header-left-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mobile-menu-toggle {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    .incident-nav-meta {
      display: flex;
      flex-direction: column;
    }

    .incident-id-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .incident-subject {
      font-size: 14px; 
      font-weight: 600;
      color: var(--text-main);
      margin-top: 1px;
    }

    .action-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 12px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .btn:hover {
      background-color: var(--bg-card-hover);
    }

    .btn-primary {
      background-color: var(--brand-primary);
      border-color: var(--brand-primary);
    }

    .workspace-frame-wrapper {
      flex: 1;
      position: relative;
      background-color: #14151f;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .loader-mask {
      position: absolute;
      inset: 0;
      background-color: var(--bg-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 8;
    }

    .loader-mask.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2.5px solid var(--border-color);
      border-top-color: var(--brand-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1024px) {
      aside {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
      }
      aside.mobile-open {
        transform: translateX(0);
      }
      .mobile-menu-toggle {
        display: block;
      }
    }

    let currentLectureIndex = 0;

    // Structural Accordion Generator Matrix
    function initSidebar() {
      const container = document.getElementById('tocContainer');
      const fallbackMsg = document.getElementById('noResultsMessage');
      
      // Clear previous rendered groups except fallback message
      const sections = container.querySelectorAll('.section-container');
      sections.forEach(s => s.remove());

      let currentSectionName = "";
      let activeSectionWrapper = null;
      let activeContentContainer = null;

      courseData.forEach((lecture, index) => {
        // Map new chapter structures
        if (lecture.section !== currentSectionName) {
          currentSectionName = lecture.section;

          activeSectionWrapper = document.createElement('div');
          activeSectionWrapper.className = 'section-container';

          const header = document.createElement('button');
          header.className = 'section-header';
          
          // Lexical binding to wrap click behaviors natively
          const currentTarget = activeSectionWrapper;
          header.onclick = () => toggleSection(currentTarget);

          const title = document.createElement('span');
          title.className = 'section-title';
          title.textContent = currentSectionName;

          const arrow = document.createElement('span');
          arrow.className = 'section-arrow';
          arrow.textContent = '▼';

          header.appendChild(title);
          header.appendChild(arrow);
          activeSectionWrapper.appendChild(header);

          activeContentContainer = document.createElement('div');
          activeContentContainer.className = 'section-content';
          activeSectionWrapper.appendChild(activeContentContainer);

          container.insertBefore(activeSectionWrapper, fallbackMsg);
        }

        // Render target items inside nested wrapper context
        const btn = document.createElement('button');
        btn.className = `toc-item lecture-item-node`;
        btn.id = `lecture-node-${index}`;
        btn.onclick = () => openLecture(index);

        const text = document.createElement('span');
        text.className = 'toc-title';
        text.textContent = lecture.subject;

        const metaRow = document.createElement('div');
        metaRow.className = 'toc-meta';
        const badge = document.createElement('span');
        badge.className = 'severity-badge';
        badge.textContent = 'Lecture';

        metaRow.appendChild(badge);
        btn.appendChild(text);
        btn.appendChild(metaRow);
        
        activeContentContainer.appendChild(btn);
      });
    }

    function toggleSection(element) {
      element.classList.toggle('collapsed');
    }

    function openLecture(index) {
      if (index < 0 || index >= courseData.length) return;
      currentLectureIndex = index;
      const target = courseData[index];

      document.getElementById('currentSectionTag').textContent = target.section.toUpperCase();
      document.getElementById('currentSubject').textContent = target.subject;

      // Reset active tags
      document.querySelectorAll('.toc-item').forEach(btn => btn.classList.remove('active'));

      const activeBtn = document.getElementById(`lecture-node-${index}`);
      if (activeBtn) {
        activeBtn.classList.add('active');
        
        // Auto-expand closed parent containers when accessed via navigation buttons
        const parentSection = activeBtn.closest('.section-container');
        if (parentSection) {
          parentSection.classList.remove('collapsed');
        }
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      document.getElementById('iframeLoader').classList.remove('hidden');
      document.getElementById('displaySandbox').src = `about:blank`;

      const sidebar = document.getElementById('dashboardSidebar');
      if (sidebar.classList.contains('mobile-open')) {
        toggleMobileSidebar();
      }
    }

    function navigateLecture(direction) {
      let targetIndex = currentLectureIndex + direction;
      if (targetIndex >= 0 && targetIndex < courseData.length) {
        openLecture(targetIndex);
      }
    }

    function filterMenuItems() {
      const filter = document.getElementById('menuSearchInput').value.toLowerCase();
      const sections = document.querySelectorAll('.section-container');
      let absoluteVisibleCount = 0;

      sections.forEach(section => {
        const items = section.querySelectorAll('.toc-item');
        let sectionHasMatchingContent = 0;

        items.forEach(item => {
          const text = item.querySelector('.toc-title').textContent.toLowerCase();
          if (text.includes(filter)) {
            item.style.display = 'flex';
            sectionHasMatchingContent++;
            absoluteVisibleCount++;
          } else {
            item.style.display = 'none';
          }
        });

        if (sectionHasMatchingContent > 0 || filter === "") {
          section.style.display = 'block';
          if (filter !== "") {
            section.classList.remove('collapsed'); // Expand auto-matched contents instantly
          }
        } else {
          section.style.display = 'none';
        }
      });

      document.getElementById('noResultsMessage').style.display = (absoluteVisibleCount === 0) ? 'block' : 'none';
    }

    function onFrameLoad() {
      document.getElementById('iframeLoader').classList.add('hidden');
    }

    function toggleMobileSidebar() {
      const sidebar = document.getElementById('dashboardSidebar');
      const text = document.getElementById('toggleButtonText');
      sidebar.classList.toggle('mobile-open');
      text.textContent = sidebar.classList.contains('mobile-open') ? "Close Menu" : "View Menu";
    }

    window.addEventListener('DOMContentLoaded', () => {
      initSidebar();
      openLecture(0);
    });
  </script>
